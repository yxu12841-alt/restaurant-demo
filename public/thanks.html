<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Thank you | The Harbour Table</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        background: #0c0a09;
        color: #f5f5f4;
        font-family: Arial, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      main {
        max-width: 560px;
        border: 1px solid #292524;
        background: #1c1917;
        border-radius: 24px;
        padding: 48px;
        text-align: center;
      }
      .label {
        color: #fcd34d;
        font-size: 13px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
      }
      h1 {
        font-size: 42px;
        margin: 18px 0 12px;
      }
      p {
        color: #d6d3d1;
        line-height: 1.7;
      }
      a {
        display: inline-block;
        margin-top: 28px;
        background: #fcd34d;
        color: #0c0a09;
        text-decoration: none;
        padding: 14px 24px;
        border-radius: 999px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="label">Request sent</div>
      <h1>Thank you.</h1>
      <p>Your reservation request has been received. We will contact you shortly to confirm.</p>
      <a href="/">Back to home</a>
    </main>
  </body>
</html>
